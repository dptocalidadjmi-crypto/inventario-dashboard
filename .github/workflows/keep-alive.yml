name: Keep dashboard awake

on:
  schedule:
    # Cada 4 horas — evita que Streamlit Cloud duerma la app por inactividad
    - cron: "0 */4 * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Visitar la app
        run: |
          curl -sL --retry 3 --retry-delay 20 --max-time 180 \
            -c /tmp/ck.txt -b /tmp/ck.txt \
            -o /dev/null -w "respuesta: HTTP %{http_code}\n" \
            "https://inventario-dashboard-ah5mkft5rzgpejtxtyquin.streamlit.app/"
