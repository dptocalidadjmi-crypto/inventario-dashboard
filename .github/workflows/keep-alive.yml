name: Keep dashboard awake

on:
  schedule:
    # Cada 4 horas — evita que Streamlit Cloud duerma la app por inactividad.
    # Nota: un curl simple NO cuenta como visita para Streamlit; hace falta
    # una sesion real de navegador (websocket), por eso usamos Playwright.
    - cron: "0 */4 * * *"
  workflow_dispatch: {}

jobs:
  visit:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright/python:v1.49.0-noble
    steps:
      - name: Visitar la app con navegador real
        run: |
          python3 -m pip install --quiet playwright==1.49.0
          python3 - <<'EOF'
          import sys
          import time
          from playwright.sync_api import sync_playwright

          URL = "https://inventario-dashboard-ah5mkft5rzgpejtxtyquin.streamlit.app/"
          MARCA = "Dashboard de Inventario"

          with sync_playwright() as p:
              browser = p.chromium.launch()
              page = browser.new_page()
              page.goto(URL, wait_until="domcontentloaded", timeout=120_000)

              # Si la app esta hibernando, pulsar el boton de despertar
              try:
                  page.get_by_text("get this app back up").click(timeout=8_000)
                  print("app dormida: boton de despertar pulsado")
              except Exception:
                  print("sin boton de despertar (app ya activa)")

              # La app corre dentro de un iframe — buscar el titulo en TODOS
              # los frames, hasta 4 minutos (el despertar tarda ~1 min)
              deadline = time.time() + 240
              visible = False
              while time.time() < deadline and not visible:
                  for frame in page.frames:
                      try:
                          if MARCA in frame.inner_text("body"):
                              visible = True
                              break
                      except Exception:
                          pass
                  if not visible:
                      page.wait_for_timeout(5_000)

              if not visible:
                  print("ERROR: el dashboard no rendereo en 4 minutos")
                  browser.close()
                  sys.exit(1)

              print("dashboard renderizado correctamente")

              # Mantener la sesion abierta un momento para que cuente como visita
              page.wait_for_timeout(20_000)
              browser.close()

          print("visita completada")
          EOF
